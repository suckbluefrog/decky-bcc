name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TZ: UTC

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify tag
        run: test "${GITHUB_REF_NAME}" = "v$(cat VERSION)"
      - name: Build, test, and package
        run: tools/make-release.sh
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/decky-bcc-*.tar.gz \
            release/decky-bcc-*.zip \
            release/SHA256SUMS \
            --generate-notes \
            --title "Batocera Control $(cat VERSION)"
