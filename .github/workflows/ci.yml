name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  TZ: UTC

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Build frontend
        run: npm run build
      - name: Verify committed frontend
        run: git diff --exit-code -- dist/index.js
      - name: Type check
        run: npx tsc --noEmit
      - name: Backend tests
        run: python3 -m unittest discover -s tests -v
      - name: Launch-option tests
        run: node tests/test-launch-options.mjs
      - name: Installer smoke test
        run: bash tests/test_installer.sh
      - name: Dependency audit
        run: npm audit
      - name: Shell syntax
        run: bash -n install.sh uninstall.sh tools/make-release.sh
